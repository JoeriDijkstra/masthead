# fly.toml app configuration file generated for dijkstra-masthead on 2026-05-13T22:04:20+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dijkstra-masthead'
primary_region = 'ams'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'masthead.site'
  APP_HOSTS = 'masthead.site'
  PHX_SERVER = 'true'
  PORT = '8080'
  # Used by the custom-domains feature to manage Fly TLS certs and to
  # derive the CNAME target. FLY_API_TOKEN is set via `fly secrets`.
  FLY_APP_NAME = 'dijkstra-masthead'
  # Transactional email sender (account confirmation / password reset).
  # Must be on the Resend-verified sending domain. RESEND_API_KEY is set
  # via `fly secrets`.
  MAIL_FROM = 'noreply@masthead.site'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
